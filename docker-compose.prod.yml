version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quovex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-quovex}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quovex}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - internal

  db_backup:
    image: postgres:16-alpine
    restart: unless-stopped
    entrypoint: >
      sh -c 'while true; do
        PGPASSWORD=$POSTGRES_PASSWORD pg_dump -h db -U $POSTGRES_USER $POSTGRES_DB
          > /backups/dump_$$(date +%Y%m%d_%H%M%S).sql;
        echo "Backup completed: dump_$$(date +%Y%m%d_%H%M%S).sql";
        sleep 86400;
      done'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quovex}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?error}
      POSTGRES_DB: ${POSTGRES_DB:-quovex}
    volumes:
      - db_backups:/backups
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - internal

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-quovex}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-quovex}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - ENVIRONMENT=production
      - UVICORN_WORKERS=2
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - upload_data:/app/uploads
    networks:
      - internal
      - public

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app worker --loglevel=info --concurrency=2
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-quovex}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-quovex}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - internal

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: celery -A app.tasks.celery_app beat --loglevel=info --scheduler celery.beat.PersistentScheduler
    environment:
      - DATABASE_URL=postgresql+psycopg2://${POSTGRES_USER:-quovex}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-quovex}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-}@redis:6379/0
      - ENVIRONMENT=production
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - internal

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=https://api.quovex.online/api/v1
    networks:
      - public

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - backend
      - dashboard
    networks:
      - public

networks:
  internal:
  public:

volumes:
  postgres_data:
  redis_data:
  upload_data:
  db_backups:
  caddy_data:
